---
- name: Kodi 配置部署 - 强制停止 Kodi
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell am force-stop org.xbmc.kodi"
  changed_when: false

# 确保目标目录存在
- name: 创建 Kodi Fonts 及 userdata 目录
  delegate_to: localhost
  ansible.builtin.command: >
    {{ adb_cmd }} shell mkdir -p
    {{ kodi_data }}/media/Fonts
    {{ kodi_data }}/userdata
  changed_when: false

# 推送字体
- name: 检查本地 fonts 目录是否存在
  delegate_to: localhost
  ansible.builtin.stat:
    path: "{{ role_path }}/files/fonts"
  register: fonts_dir

- name: 推送 Kodi 字体文件
  delegate_to: localhost
  ansible.builtin.command: >
    {{ adb_cmd }} push {{ role_path }}/files/fonts/. {{ kodi_data }}/media/Fonts/
  when: fonts_dir.stat.exists and fonts_dir.stat.isdir
  changed_when: true

- name: 提示：请手动安装 Aeon 皮肤并设置为默认皮肤
  ansible.builtin.debug:
    msg: |
      请手动安装 skin.aeon.nox.silvo 到 {{ kodi_data }}/addons/，或通过 Kodi 插件管理进行安装。
      安装后，请在 Kodi 设置中将 Aeon 皮肤设为默认皮肤。

# 推送 sources.xml
- name: 检查本地 sources.xml 是否存在
  delegate_to: localhost
  ansible.builtin.stat:
    path: "{{ role_path }}/files/kodi/sources.xml"
  register: sources_xml

- name: 推送 sources.xml
  delegate_to: localhost
  ansible.builtin.shell: |
    {{ adb_cmd }} shell "rm {{ kodi_data }}/userdata/sources.xml 2>/dev/null || true"
    {{ adb_cmd }} push {{ role_path }}/files/kodi/sources.xml {{ kodi_data }}/userdata/sources.xml
  when: sources_xml.stat.exists
  changed_when: true

# 推送 guisettings.xml（包含字体、皮肤等 GUI 设置）
- name: 检查本地 guisettings.xml 是否存在
  delegate_to: localhost
  ansible.builtin.stat:
    path: "{{ role_path }}/files/kodi/guisettings.xml"
  register: guisettings_xml

- name: 推送 guisettings.xml
  delegate_to: localhost
  ansible.builtin.command: >
    {{ adb_cmd }} push {{ role_path }}/files/kodi/guisettings.xml
    {{ kodi_data }}/userdata/guisettings.xml
  when: guisettings_xml.stat.exists
  changed_when: true
  retries: 3
  delay: 2

# 渲染并推送 advancedsettings.xml（含 MariaDB 连接 + moviesetsfolder）
- name: 渲染 advancedsettings.xml 模板
  delegate_to: localhost
  ansible.builtin.template:
    src: "{{ role_path }}/files/kodi/advancedsettings.xml.j2"
    dest: "/tmp/advancedsettings.xml"
    mode: '0644'

- name: 推送 advancedsettings.xml 到 Kodi userdata
  delegate_to: localhost
  ansible.builtin.command: >
    {{ adb_cmd }} push /tmp/advancedsettings.xml
    {{ kodi_data }}/userdata/advancedsettings.xml
  changed_when: true

# splash.jpg（可选，优先于 advancedsettings.xml 里的 splash 设置）
- name: 检查本地 splash.jpg 是否存在
  delegate_to: localhost
  ansible.builtin.stat:
    path: "{{ role_path }}/files/kodi/splash.jpg"
  register: splash_jpg

- name: 部署 splash.jpg
  delegate_to: localhost
  ansible.builtin.shell: |
    {{ adb_cmd }} shell "rm {{ kodi_data }}/media/splash.jpg {{ kodi_data }}/media/splash.png 2>/dev/null || true"
    {{ adb_cmd }} push {{ role_path }}/files/kodi/splash.jpg {{ kodi_data }}/media/splash.jpg
  when: splash_jpg.stat.exists
  changed_when: true

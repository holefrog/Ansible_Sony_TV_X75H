---
# Android 11 Scoped Storage 限制下，部分应用无法通过正常流程获取完整存储权限。
# 使用 appops 直接授权，效果等同于在系统设置中手动开启"所有文件访问权限"。
- name: 检查完整存储权限状态
  delegate_to: localhost
  ansible.builtin.command: >
    {{ adb_cmd }} shell appops get --uid {{ item }} MANAGE_EXTERNAL_STORAGE
  loop:
    - pl.solidexplorer2
    - org.xbmc.kodi
    - org.videolan.vlc
  register: permission_check
  changed_when: false
  failed_when: false

- name: 授予完整存储权限 (Android 11 MANAGE_EXTERNAL_STORAGE)
  delegate_to: localhost
  ansible.builtin.command: >
    {{ adb_cmd }} shell appops set --uid {{ item.item }} MANAGE_EXTERNAL_STORAGE allow
  loop: "{{ permission_check.results }}"
  when: "item.stdout is defined and 'allow' not in item.stdout"
  failed_when: false
  loop_control:
    label: "{{ item.item }}"

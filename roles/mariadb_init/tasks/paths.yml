---
# MyVideos131 是 Kodi 21 Omega 的数据库版本
# 必须等 Kodi 第一次启动后自动建库建表，才能执行此 task
# 如果数据库不存在，此 task 会报错提示先启动 Kodi

- name: 验证 MyVideos131 数据库已由 Kodi 初始化完成
  community.mysql.mysql_query:
    login_host: "{{ mariadb_host }}"
    login_port: "{{ mariadb_port }}"
    login_user: "{{ mariadb_user }}"
    login_password: "{{ mariadb_password }}"
    login_db: MyVideos131
    query: "SELECT COUNT(*) FROM path"
  register: path_check
  failed_when: false

- name: 确认数据库已就绪
  ansible.builtin.fail:
    msg: |
      【未就绪】MyVideos131 数据库不存在或 path 表不存在。
      请先在 Sony TV 上启动 Kodi 一次，等待其连接 MariaDB 并完成建库，
      然后再重新执行 apply_mariadb.sh。
  when: path_check.failed is defined and path_check.failed

# INSERT IGNORE：路径已存在则跳过，不重复插入
- name: 写入媒体路径与内容类型绑定关系
  community.mysql.mysql_query:
    login_host: "{{ mariadb_host }}"
    login_port: "{{ mariadb_port }}"
    login_user: "{{ mariadb_user }}"
    login_password: "{{ mariadb_password }}"
    login_db: MyVideos131
    query: >
      INSERT IGNORE INTO path
        (strPath, strContent, strScraper, strSettings, scanRecursive, useFolderNames, noUpdate, exclude)
      VALUES
        (%s, %s, %s, '', %s, %s, 0, 0)
    positional_args:
      - "{{ item.path }}"
      - "{{ item.content }}"
      - "{{ item.scraper }}"
      - "{{ item.scan_recursive }}"
      - "{{ item.use_folder_names }}"
  loop: "{{ kodi_paths }}"
  loop_control:
    label: "{{ item.path }}"

- name: 验证绑定关系已写入
  community.mysql.mysql_query:
    login_host: "{{ mariadb_host }}"
    login_port: "{{ mariadb_port }}"
    login_user: "{{ mariadb_user }}"
    login_password: "{{ mariadb_password }}"
    login_db: MyVideos131
    query: >
      SELECT strPath, strContent, strScraper
      FROM path
      WHERE strContent != '' AND strContent IS NOT NULL
      ORDER BY strPath
  register: path_result

- name: 打印当前路径绑定关系
  ansible.builtin.debug:
    msg: "{{ path_result.query_result }}"

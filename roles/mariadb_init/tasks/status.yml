---
# ── 第一层：关键 Bloat 应用禁用验证 ──────────────────────────────────────

# -e 参数仅列出已启用的应用；若已被禁用，输出为空
- name: 验证遥测应用已被禁用
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm list packages -e {{ item }}"
  register: check_telemetry
  changed_when: false
  failed_when: item in check_telemetry.stdout
  loop: "{{ telemetry_apps | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: 验证广告应用已被禁用
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm list packages -e {{ item }}"
  register: check_ads
  changed_when: false
  failed_when: item in check_ads.stdout
  loop: "{{ ad_apps | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: 验证 Sony 冗余应用已被禁用
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm list packages -e {{ item }}"
  register: check_sony
  changed_when: false
  failed_when: item in check_sony.stdout
  loop: "{{ sony_bloat_apps | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: 验证 Google 冗余组件已被禁用
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm list packages -e {{ item }}"
  register: check_google
  changed_when: false
  failed_when: item in check_google.stdout
  loop: "{{ google_bloat_apps | default([]) }}"
  loop_control:
    label: "{{ item }}"

# ── 第二层：应用安装与配置验证 ───────────────────────────────────────────

- name: 验证 Projectivy Launcher 已安装
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm list packages com.spocky.projengmenu"
  register: check_projectivy
  changed_when: false
  failed_when: "'com.spocky.projengmenu' not in check_projectivy.stdout"

- name: 验证 Projectivy 为当前默认桌面
  delegate_to: localhost
  ansible.builtin.command: >
    {{ adb_cmd }} shell cmd package resolve-activity
    -c android.intent.category.HOME -a android.intent.action.MAIN
  register: check_home
  changed_when: false
  failed_when: "'com.spocky.projengmenu' not in check_home.stdout"

- name: 验证 Kodi 已安装
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm list packages org.xbmc.kodi"
  register: check_kodi
  changed_when: false
  failed_when: "'org.xbmc.kodi' not in check_kodi.stdout"

- name: 验证 MariaDB Kodi 数据库 MyVideos131 是否存在
  delegate_to: localhost
  community.mysql.mysql_info:
    login_host: "{{ mariadb_host }}"
    login_port: "{{ mariadb_port }}"
    login_user: "{{ mariadb_user }}"
    login_password: "{{ mariadb_password }}"
    filter: databases
  register: check_mariadb
  changed_when: false
  failed_when: false

- name: 确认 MariaDB Kodi 数据库 MyVideos131 已初始化
  ansible.builtin.assert:
    that:
      - "'MyVideos131' in check_mariadb.databases"
    fail_msg: |
      MariaDB 中未检测到 Kodi 数据库 MyVideos131。
      这表明 mariadb_init 任务可能未完成或数据库尚未初始化。

- name: 验证 Kodi 媒体源绑定关系已写入 MyVideos131.path
  delegate_to: localhost
  community.mysql.mysql_query:
    login_host: "{{ mariadb_host }}"
    login_port: "{{ mariadb_port }}"
    login_user: "{{ mariadb_user }}"
    login_password: "{{ mariadb_password }}"
    login_db: MyVideos131
    query: >
      SELECT COUNT(*) AS path_count
      FROM path
      WHERE strContent != '' AND strContent IS NOT NULL
  register: check_path_bindings
  changed_when: false
  failed_when: false

- name: 确认 Kodi 媒体源绑定关系已写入
  ansible.builtin.assert:
    that:
      - check_path_bindings.query_result[0][0].path_count | int > 0
    fail_msg: |
      未检测到任何 Kodi 媒体源绑定关系写入到 MyVideos131.path 表。
      请确认 mariadb_init 已成功执行媒体路径写入任务。

- name: 验证 Kodi sources.xml 已推送
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell ls {{ kodi_data }}/userdata/sources.xml"
  register: check_sources
  changed_when: false
  failed_when: check_sources.rc != 0

- name: 验证 Kodi 字体目录不为空
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell ls {{ kodi_data }}/media/Fonts/"
  register: check_fonts
  changed_when: false
  failed_when: check_fonts.rc != 0 or check_fonts.stdout | trim == ''

- name: 验证完整存储权限已授予
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell appops get --uid {{ item }} MANAGE_EXTERNAL_STORAGE"
  register: check_permissions
  changed_when: false
  failed_when: "'allow' not in check_permissions.stdout"
  loop:
    - pl.solidexplorer2
    - org.xbmc.kodi
    - org.videolan.vlc
  loop_control:
    label: "{{ item }}"

# ── 部署完成汇总 ──────────────────────────────────────────────────────────

- name: 打印最终部署状态
  ansible.builtin.debug:
    msg: "✅ 所有检查均已通过：Bloat 已禁用，Projectivy 已就位，Kodi 配置与 MariaDB 媒体源绑定已部署。"

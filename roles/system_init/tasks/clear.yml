---
# 查询一次当前所有已启用的包，供后续四个 task 复用
- name: 获取设备当前已启用的包列表
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm list packages -e"
  register: enabled_packages
  changed_when: false

# 禁用遥测 / 隐私追踪类应用
- name: 禁用遥测与隐私追踪应用
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm disable-user --user 0 {{ item }}"
  loop: "{{ telemetry_apps | default([]) }}"
  when: item in enabled_packages.stdout
  changed_when: true
  failed_when: false

# 禁用广告 / 推广内容类应用
- name: 禁用广告与推广应用
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm disable-user --user 0 {{ item }}"
  loop: "{{ ad_apps | default([]) }}"
  when: item in enabled_packages.stdout
  changed_when: true
  failed_when: false

# 禁用 Sony 无用内置功能类应用
- name: 禁用 Sony 无用内置应用
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm disable-user --user 0 {{ item }}"
  loop: "{{ sony_bloat_apps | default([]) }}"
  when: item in enabled_packages.stdout
  changed_when: true
  failed_when: false

# 禁用 Google 冗余组件类应用
- name: 禁用 Google 冗余组件
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm disable-user --user 0 {{ item }}"
  loop: "{{ google_bloat_apps | default([]) }}"
  when: item in enabled_packages.stdout
  changed_when: true
  failed_when: false
---
# 禁用遥测 / 隐私追踪类应用
- name: 禁用遥测与隐私追踪应用
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm disable-user --user 0 {{ item }}"
  loop: "{{ telemetry_apps | default([]) }}"
  register: disable_telemetry
  changed_when: "'disabled-user' in disable_telemetry.stdout"
  failed_when: false

# 禁用广告 / 推广内容类应用
- name: 禁用广告与推广应用
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm disable-user --user 0 {{ item }}"
  loop: "{{ ad_apps | default([]) }}"
  register: disable_ads
  changed_when: "'disabled-user' in disable_ads.stdout"
  failed_when: false

# 禁用 Sony 无用内置功能类应用
- name: 禁用 Sony 无用内置应用
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm disable-user --user 0 {{ item }}"
  loop: "{{ sony_bloat_apps | default([]) }}"
  register: disable_sony
  changed_when: "'disabled-user' in disable_sony.stdout"
  failed_when: false

# 禁用 Google 冗余组件类应用
- name: 禁用 Google 冗余组件
  delegate_to: localhost
  ansible.builtin.command: "{{ adb_cmd }} shell pm disable-user --user 0 {{ item }}"
  loop: "{{ google_bloat_apps | default([]) }}"
  register: disable_google
  changed_when: "'disabled-user' in disable_google.stdout"
  failed_when: false
